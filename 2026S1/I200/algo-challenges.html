<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algo Practice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e4dc;
  --text2: #888;
  --text3: #555;
  --accent: #c8ff00;
  --accent2: #ff6b35;
  --accent3: #4ecdc4;
  --accent4: #a78bfa;
  --red: #ff4757;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* LAYOUT */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 2px;
}

.logo span { color: var(--accent); }

.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}

.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-search input:focus { border-color: var(--accent); }

.task-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.task-list::-webkit-scrollbar { width: 4px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.phase-label {
  padding: 12px 16px 4px;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
}

.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}

.task-item:hover { background: var(--bg3); }
.task-item.active { background: rgba(200,255,0,0.05); border-left-color: var(--accent); }

.task-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 18px;
}

.task-item.active .task-num { color: var(--accent); }

.task-info { flex: 1; min-width: 0; }

.task-title-sm {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-item.active .task-title-sm { color: var(--accent); }

.task-meta-sm {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
}

.difficulty-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  min-width: 6px;
}

.d-easy { background: var(--accent3); }
.d-medium { background: var(--accent); }
.d-hard { background: var(--accent2); }
.d-xhard { background: var(--accent4); }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  padding: 0 24px;
  gap: 0;
}

.tab {
  padding: 14px 16px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* TASK VIEW */
.task-view {
  display: none;
  height: 100%;
  flex-direction: column;
}

.task-view.visible { display: flex; }

/* PROBLEM PANEL */
.problem-panel {
  flex: 1;
  overflow-y: auto;
  padding: 32px 36px;
}

.problem-panel::-webkit-scrollbar { width: 4px; }
.problem-panel::-webkit-scrollbar-thumb { background: var(--border2); }

.problem-header { margin-bottom: 28px; }

.problem-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.problem-title {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 10px;
  line-height: 1.2;
}

.problem-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}

.badge-complexity { background: rgba(200,255,0,0.1); color: var(--accent); border: 1px solid rgba(200,255,0,0.2); }
.badge-type { background: rgba(78,205,196,0.1); color: var(--accent3); border: 1px solid rgba(78,205,196,0.2); }
.badge-struct { background: rgba(167,139,250,0.1); color: var(--accent4); border: 1px solid rgba(167,139,250,0.2); }
.badge-hard { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.2); }

.divider-line {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}

.problem-text {
  color: #b8b4ac;
  line-height: 1.8;
  font-size: 14px;
  margin-bottom: 16px;
}

.problem-text strong { color: var(--text); font-weight: 500; }

.example-block {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: #9a9690;
}

.example-block .ex-label {
  color: var(--text3);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.example-block .ex-in { color: var(--accent3); }
.example-block .ex-out { color: var(--accent); }
.example-block .ex-comment { color: var(--text3); }

.hint-block {
  background: rgba(200,255,0,0.03);
  border: 1px solid rgba(200,255,0,0.1);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
}

.hint-title {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.hint-text {
  font-size: 13px;
  color: #9a9690;
  line-height: 1.7;
}

.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 16px;
}

.complexity-table th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text3);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 400;
}

.complexity-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: #9a9690;
}

.complexity-table td:first-child { color: var(--text); }
.complexity-table td.good { color: var(--accent3); }
.complexity-table td.mid { color: var(--accent); }
.complexity-table td.bad { color: var(--accent2); }

/* SOLUTION PANEL */
.solution-panel {
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  flex-direction: column;
  max-height: 340px;
}

.solution-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}

.solution-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
}

.solution-btns { display: flex; gap: 8px; }

.btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
}

.btn:hover { color: var(--text); border-color: var(--text3); }

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 500;
}

.btn-primary:hover { background: #d4ff1a; }

.btn-reveal {
  background: rgba(167,139,250,0.15);
  color: var(--accent4);
  border-color: rgba(167,139,250,0.3);
}

.btn-reveal:hover { background: rgba(167,139,250,0.25); }

.code-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.code-area textarea {
  width: 100%;
  height: 100%;
  min-height: 180px;
  background: var(--bg);
  border: none;
  outline: none;
  resize: none;
  color: #c8c4bc;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 16px 20px;
  tab-size: 4;
}

/* SOLUTION OVERLAY */
.solution-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  overflow-y: auto;
}

.solution-overlay.visible { display: flex; }

.solution-code {
  padding: 16px 20px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  color: #c8c4bc;
  white-space: pre;
  overflow-x: auto;
}

/* Syntax coloring */
.kw { color: var(--accent4); }
.type { color: var(--accent3); }
.fn { color: var(--accent); }
.str { color: var(--accent2); }
.cmt { color: #555; font-style: italic; }
.num { color: #ff9f43; }

/* WELCOME */
.welcome {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 12px;
  text-align: center;
}

.welcome-icon {
  font-size: 48px;
  margin-bottom: 8px;
  opacity: 0.3;
}

.welcome-title {
  font-family: var(--serif);
  font-size: 24px;
  color: var(--text2);
}

.welcome-sub {
  font-size: 13px;
  color: var(--text3);
  font-family: var(--mono);
}

/* PROGRESS BAR */
.progress-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.progress-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}

/* STATS ROW */
.stats-row {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.stat-item {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  border-right: 1px solid var(--border);
}

.stat-item:last-child { border-right: none; }

.stat-val {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--text);
  display: block;
}

.stat-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-view.visible .problem-panel { animation: fadeIn 0.25s ease; }

/* SCROLLBAR */
* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">algo<span>.</span>practice</div>
      <div class="logo-sub">Estructuras & Algoritmos</div>
    </div>

    <div class="sidebar-search">
      <input type="text" placeholder="buscar tarea..." id="searchInput" oninput="filterTasks(this.value)">
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="progress-bar">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 15</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-val" id="statDone">0</span>
        <span class="stat-label">completadas</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="statStreak">0</span>
        <span class="stat-label">en fila</span>
      </div>
      <div class="stat-item">
        <span class="stat-val">15</span>
        <span class="stat-label">total</span>
      </div>
    </div>

    <div class="main-tabs">
      <div class="tab active" onclick="switchTab('problem')">Problema</div>
      <div class="tab" onclick="switchTab('notes')">Notas</div>
    </div>

    <div class="main-content">
      <!-- Welcome -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">⌨</div>
        <div class="welcome-title">Seleccioná una tarea</div>
        <div class="welcome-sub">15 tasks · Estructuras de datos · Algoritmos</div>
      </div>

      <!-- Task View -->
      <div class="task-view" id="taskView">
        <div class="problem-panel" id="problemPanel"></div>
        <div class="solution-panel">
          <div class="solution-header">
            <span class="solution-title">EDITOR C</span>
            <div class="solution-btns">
              <button class="btn btn-reveal" onclick="toggleSolution()">Ver solución</button>
              <button class="btn btn-primary" onclick="markDone()">✓ Listo</button>
            </div>
          </div>
          <div class="code-area">
            <textarea id="codeEditor" spellcheck="false" placeholder="// Escribí tu solución acá en C...&#10;#include &lt;stdio.h&gt;&#10;#include &lt;stdlib.h&gt;&#10;"></textarea>
            <div class="solution-overlay" id="solutionOverlay">
              <div class="solution-code" id="solutionCode"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const tasks = [
  {
    id: 1,
    num: "01",
    title: "Vector dinámico",
    phase: "Bloque 1 — Estructuras base",
    difficulty: "easy",
    complexity: "O(1) amort.",
    type: "impl",
    struct: "array",
    problem: `
<div class="problem-header">
  <div class="problem-num">TAREA 01 · BLOQUE 1</div>
  <div class="problem-title">Vector Dinámico</div>
  <div class="problem-badges">
    <span class="badge badge-complexity">O(1) amortizado</span>
    <span class="badge badge-type">implementación</span>
    <span class="badge badge-struct">array</span>
  </div>
</div>

<div class="divider-line"></div>

<div class="section-label">Descripción</div>
<div class="problem-text">
Implementá un vector dinámico en C con las siguientes operaciones. El vector debe crecer automáticamente cuando se llena, duplicando su capacidad con <code>realloc</code>.
</div>

<div class="section-label">Interfaz requerida</div>
<div class="example-block">
<div class="ex-label">funciones</div>
<span class="ex-in">Vector* VectorBuild(int capacidadInicial);
void    VectorDestroy(Vector* v);
int     VectorGetAt(Vector* v, int pos);
void    VectorSetAt(Vector* v, int pos, int val);
void    VectorPushBack(Vector* v, int val);
int     VectorSearch(Vector* v, int buscado);</span>
</div>

<div class="section-label">Pregunta clave</div>
<div class="hint-block">
  <div class="hint-title">¿Por qué PushBack es O(1) amortizado?</div>
  <div class="hint-text">Aunque a veces hace realloc (costoso), esto pasa cada vez con menos frecuencia. Si doblás la capacidad cada vez, el costo total de N inserciones es O(N), entonces cada una cuesta O(1) en promedio. Pensá: ¿cuántos realloc ocurren en N pushbacks?</div>
</div>

<table class="complexity-table">
  <tr><th>Operación</th><th>Complejidad</th><th>Razón</th></tr>
  <tr><td>GetAt / SetAt</td><td class="good">O(1)</td><td>acceso directo por índice</td></tr>
  <tr><td>PushBack (normal)</td><td class="good">O(1)</td><td>sólo escribe al final</td></tr>
  <tr><td>PushBack (con resize)</td><td class="bad">O(n)</td><td>copia todo el arreglo</td></tr>
  <tr><td>PushBack amortizado</td><td class="good">O(1)</td><td>resize ocurre 1/n veces</td></tr>
  <tr><td>Search</td><td class="mid">O(n)</td><td>recorrido lineal</td></tr>
</table>`,
    solution: `<span class="cmt">// Vector dinámico — implementación completa</span>
<span class="kw">#include</span> <span class="str">&lt;stdio.h&gt;</span>
<span class="kw">#include</span> <span class="str">&lt;stdlib.h&gt;</span>

<span class="kw">typedef struct</span> {
    <span class="type">int</span> *datos;
    <span class="type">int</span> cantidad;
    <span class="type">int</span> capacidad;
} <span class="type">Vector</span>;

<span class="type">Vector</span>* <span class="fn">VectorBuild</span>(<span class="type">int</span> cap) {
    <span class="type">Vector</span> *v = <span class="fn">malloc</span>(<span class="kw">sizeof</span>(<span class="type">Vector</span>));
    v->datos = <span class="fn">malloc</span>(cap * <span class="kw">sizeof</span>(<span class="type">int</span>));
    v->cantidad = <span class="num">0</span>;
    v->capacidad = cap;
    <span class="kw">return</span> v;
}

<span class="kw">void</span> <span class="fn">VectorPushBack</span>(<span class="type">Vector</span> *v, <span class="type">int</span> val) {
    <span class="kw">if</span> (v->cantidad == v->capacidad) {
        v->capacidad *= <span class="num">2</span>;  <span class="cmt">// duplicar capacidad</span>
        v->datos = <span class="fn">realloc</span>(v->datos, v->capacidad * <span class="kw">sizeof</span>(<span class="type">int</span>));
    }
    v->datos[v->cantidad++] = val;
}

<span class="type">int</span> <span class="fn">VectorGetAt</span>(<span class="type">Vector</span> *v, <span class="type">int</span> pos) {
    <span class="kw">return</span> v->datos[pos];
}

<span class="kw">void</span> <span class="fn">VectorSetAt</span>(<span class="type">Vector</span> *v, <span class="type">int</span> pos, <span class="type">int</span> val) {
    v->datos[pos] = val;
}

<span class="type">int</span> <span class="fn">VectorSearch</span>(<span class="type">Vector</span> *v, <span class="type">int</span> buscado) {
    <span class="kw">for</span> (<span class="type">int</span> i = <span class="num">0</span>; i < v->cantidad; i++)
        <span class="kw">if</span> (v->datos[i] == buscado) <span class="kw">return</span> i;
    <span class="kw">return</span> -<span class="num">1</span>;
}

<span class="kw">void</span> <span class="fn">VectorDestroy</span>(<span class="type">Vector</span> *v) {
    <span class="fn">free</span>(v->datos);
    <span class="fn">free</span>(v);
}`
  },
  {
    id: 2,
    num: "02",
    title: "Lista enlazada + reversa",
    phase: "Bloque 1 — Estructuras base",
    difficulty: "easy",
    complexity: "O(n)",
    type: "impl",
    struct: "lista",
    problem: `
<div class="problem-header">
  <div class="problem-num">TAREA 02 · BLOQUE 1</div>
  <div class="problem-title">Lista Enlazada + Reversa</div>
  <div class="problem-badges">
    <span class="badge badge-complexity">O(n)</span>
    <span class="badge badge-type">implementación</span>
    <span class="badge badge-struct">linked list</span>
  </div>
</div>
<div class="divider-line"></div>
<div class="section-label">Descripción</div>
<div class="problem-text">Implementá una lista enlazada simple. Después, <strong>invertí la lista sin usar memoria extra</strong> — sólo reorganizando los punteros.</div>
<div class="section-label">Interfaz requerida</div>
<div class="example-block">
<div class="ex-label">funciones</div>
<span class="ex-in">Lista* ListaBuild();
void   ListaInsertHead(Lista* l, int val);
void   ListaInsertTail(Lista* l, int val);

    solution: `<span class="kw">void</span> <span class="fn">merge</span>(<span class="type">int</span> a[], <span class="type">int</span> ini, <span class="type">int</span> med, <span class="type">int</span> fin) {
    <span class="type">int</span> n = fin - ini + <span class="num">1</span>;
    <span class="type">int</span> *aux = <span class="fn">malloc</span>(n * <span class="kw">sizeof</span>(<span class="type">int</span>));
    <span class="type">int</span> i = ini, j = med+<span class="num">1</span>, k = <span class="num">0</span>;

    <span class="kw">while</span> (i <= med && j <= fin)
        aux[k++] = (a[i] <= a[j]) ? a[i++] : a[j++];
    <span class="kw">while</span> (i <= med)  aux[k++] = a[i++];
    <span class="kw">while</span> (j <= fin)  aux[k++] = a[j++];

    <span class="kw">for</span> (<span class="type">int</span> x = <span class="num">0</span>; x < n; x++) a[ini+x] = aux[x];
    <span class="fn">free</span>(aux);

    <span class="fn">mergeSort</span>(a, ini, med);

    solution: `<span class="type">long long</span> <span class="fn">mergeCount</span>(<span class="type">int</span> a[], <span class="type">int</span> ini, <span class="type">int</span> med, <span class="type">int</span> fin) {
    <span class="type">long long</span> inv = <span class="num">0</span>;
    <span class="type">int</span> n = fin-ini+<span class="num">1</span>;
    <span class="type">int</span> *aux = <span class="fn">malloc</span>(n * <span class="kw">sizeof</span>(<span class="type">int</span>));
    <span class="type">int</span> i=ini, j=med+<span class="num">1</span>, k=<span class="num">0</span>;

    <span class="kw">while</span> (i<=med && j<=fin) {
        <span class="kw">if</span> (a[i] <= a[j]) { aux[k++] = a[i++]; }
        <span class="kw">else</span> {
            aux[k++] = a[j++];
            inv += (med - i + <span class="num">1</span>);  <span class="cmt">// CLAVE: inversiones</span>
        }
    }
    <span class="kw">while</span>(i<=med) aux[k++]=a[i++];
    <span class="kw">while</span>(j<=fin) aux[k++]=a[j++];
    <span class="kw">for</span>(<span class="type">int</span> x=<span class="num">0</span>;x<n;x++) a[ini+x]=aux[x];
    <span class="fn">free</span>(aux);
    <span class="kw">return</span> inv;

<span class="type">long long</span> <span class="fn">countInversions</span>(<span class="type">int</span> a[], <span class="type">int</span> ini, <span class="type">int</span> fin) {

    solution: `<span class="kw">#include</span> <span class="str">&lt;stdlib.h&gt;</span>

<span class="type">int</span> <span class="fn">partition</span>(<span class="type">int</span> a[], <span class="type">int</span> l, <span class="type">int</span> r) {
    <span class="type">int</span> pivot = a[r], i = l-<span class="num">1</span>;
    <span class="kw">for</span> (<span class="type">int</span> j=l; j<r; j++) {
        <span class="kw">if</span> (a[j] <= pivot) {
            i++;
            <span class="type">int</span> t=a[i]; a[i]=a[j]; a[j]=t;
        }
    }
    <span class="type">int</span> t=a[i+<span class="num">1</span>]; a[i+<span class="num">1</span>]=a[r]; a[r]=t;
    <span class="kw">return</span> i+<span class="num">1</span>;
}

<span class="kw">void</span> <span class="fn">quickSortRand</span>(<span class="type">int</span> a[], <span class="type">int</span> l, <span class="type">int</span> r) {
    <span class="kw">if</span> (l >= r) <span class="kw">return</span>;
    <span class="cmt">// pivot aleatorio: evita worst case</span>
    <span class="type">int</span> idx = l + <span class="fn">rand</span>() % (r-l+<span class="num">1</span>);
    <span class="type">int</span> t=a[idx]; a[idx]=a[r]; a[r]=t;
    <span class="type">int</span> p = <span class="fn">partition</span>(a, l, r);
    <span class="fn">quickSortRand</span>(a, l, p-<span class="num">1</span>);
    <span class="fn">quickSortRand</span>(a, p+<span class="num">1</span>, r);
}`

<div class="ex-label">counting sort — ejemplo</div>
<span class="ex-in">[7,1,3,1,2,4]</span>
<br><span class="ex-comment">contadores: [0,2,1,1,1,0,0,1]</span>
<br><span class="ex-out">resultado:  [1,1,2,3,4,7]</span>
</div>
<div class="hint-block">
  <div class="hint-title">¿Por qué no siempre usamos O(n)?</div>
  <div class="hint-text">Counting sort necesita un arreglo de tamaño <code>max</code>. Si max = 10^9, el arreglo auxiliar sería enorme. Solo sirve cuando el rango de valores es pequeño respecto a n.</div>
</div>`,
    solution: `<span class="kw">void</span> <span class="fn">countingSort</span>(<span class="type">int</span> a[], <span class="type">int</span> n, <span class="type">int</span> max) {
    <span class="type">int</span> *cnt = <span class="fn">calloc</span>(max+<span class="num">1</span>, <span class="kw">sizeof</span>(<span class="type">int</span>));
    <span class="kw">for</span> (<span class="type">int</span> i=<span class="num">0</span>;i<n;i++) cnt[a[i]]++;
    <span class="type">int</span> k=<span class="num">0</span>;
    <span class="kw">for</span> (<span class="type">int</span> v=<span class="num">0</span>;v<=max;v++)
        <span class="kw">while</span>(cnt[v]--) a[k++]=v;
    <span class="fn">free</span>(cnt);
}

<span class="cmt">// Radix sort: ordena por cada dígito (LSD)</span>
<span class="kw">void</span> <span class="fn">countByDigit</span>(<span class="type">int</span> a[], <span class="type">int</span> n, <span class="type">int</span> exp) {
    <span class="type">int</span> *out = <span class="fn">malloc</span>(n*<span class="kw">sizeof</span>(<span class="type">int</span>)), cnt[<span class="num">10</span>]={};
    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">0</span>;i<n;i++) cnt[(a[i]/exp)%<span class="num">10</span>]++;
    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">1</span>;i<<span class="num">10</span>;i++) cnt[i]+=cnt[i-<span class="num">1</span>];
    <span class="kw">for</span>(<span class="type">int</span> i=n-<span class="num">1</span>;i>=<span class="num">0</span>;i--) out[--cnt[(a[i]/exp)%<span class="num">10</span>]]=a[i];
    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">0</span>;i<n;i++) a[i]=out[i];
    <span class="fn">free</span>(out);
}

<span class="kw">void</span> <span class="fn">radixSort</span>(<span class="type">int</span> a[], <span class="type">int</span> n) {
    <span class="type">int</span> max=a[<span class="num">0</span>];
    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">1</span>;i<n;i++) <span class="kw">if</span>(a[i]>max) max=a[i];
    <span class="kw">for</span>(<span class="type">int</span> e=<span class="num">1</span>;max/e><span class="num">0</span>;e*=<span class="num">10</span>) <span class="fn">countByDigit</span>(a,n,e);
}`

</table>
<div class="hint-block">

  <div class="hint-text">Las hojas (n/2 nodos) tienen costo 0. Los nodos de altura 1 tienen costo 1, etc. La suma total converge a O(n). La mayoría de los nodos están cerca del fondo y tienen poca altura.</div>

    solution: `<span class="kw">typedef struct</span> { <span class="type">int</span> *p; <span class="type">int</span> n; <span class="type">int</span> cap; } <span class="type">Heap</span>;

<span class="type">Heap</span>* <span class="fn">HeapBuild</span>(<span class="type">int</span> cap) {
    <span class="type">Heap</span> *h = <span class="fn">malloc</span>(<span class="kw">sizeof</span>(<span class="type">Heap</span>));
    h->p = <span class="fn">malloc</span>((cap+<span class="num">1</span>)*<span class="kw">sizeof</span>(<span class="type">int</span>));  <span class="cmt">// desde pos 1</span>
    h->n = <span class="num">0</span>; h->cap = cap;
    <span class="kw">return</span> h;
}

<span class="kw">void</span> <span class="fn">heapUp</span>(<span class="type">Heap</span>*h, <span class="type">int</span> i) {
    <span class="kw">while</span> (i><span class="num">1</span> && h->p[i]<h->p[i/<span class="num">2</span>]) {
        <span class="type">int</span> t=h->p[i]; h->p[i]=h->p[i/<span class="num">2</span>]; h->p[i/<span class="num">2</span>]=t;
        i/=<span class="num">2</span>;
    }
}

<span class="kw">void</span> <span class="fn">heapDown</span>(<span class="type">Heap</span>*h, <span class="type">int</span> i) {
    <span class="kw">while</span> (<span class="num">2</span>*i<=h->n) {
        <span class="type">int</span> hijo=<span class="num">2</span>*i;
        <span class="kw">if</span>(hijo<h->n && h->p[hijo+<span class="num">1</span>]<h->p[hijo]) hijo++;
        <span class="kw">if</span>(h->p[i]<=h->p[hijo]) <span class="kw">break</span>;
        <span class="type">int</span> t=h->p[i]; h->p[i]=h->p[hijo]; h->p[hijo]=t;
        i=hijo;
    }
}

<span class="kw">void</span> <span class="fn">HeapInsert</span>(<span class="type">Heap</span>*h, <span class="type">int</span> v) { h->p[++h->n]=v; <span class="fn">heapUp</span>(h,h->n); }
<span class="type">int</span>  <span class="fn">HeapGetMin</span>(<span class="type">Heap</span>*h) { <span class="kw">return</span> h->p[<span class="num">1</span>]; }

<span class="type">int</span> <span class="fn">HeapRemoveMin</span>(<span class="type">Heap</span>*h) {
    <span class="type">int</span> min=h->p[<span class="num">1</span>];
    h->p[<span class="num">1</span>]=h->p[h->n--];
    <span class="fn">heapDown</span>(h,<span class="num">1</span>);
    <span class="kw">return</span> min;
}

<span class="kw">void</span> <span class="fn">Heapify</span>(<span class="type">Heap</span>*h, <span class="type">int</span>*a, <span class="type">int</span> n) {
    <span class="kw">for</span>(<span class="type">int</span>i=<span class="num">1</span>;i<=n;i++) h->p[i]=a[i-<span class="num">1</span>];
    h->n=n;
    <span class="kw">for</span>(<span class="type">int</span>i=n/<span class="num">2</span>;i>=<span class="num">1</span>;i--) <span class="fn">heapDown</span>(h,i);  <span class="cmt">// O(n)!</span>
}`

    solution: `<span class="type">int</span> <span class="fn">kesimoMenor</span>(<span class="type">int</span> a[], <span class="type">int</span> n, <span class="type">int</span> k) {

            <span class="fn">HeapInsert</span>(h, -a[i]);

    <span class="fn">free</span>(h->p); <span class="fn">free</span>(h);

    solution: `<span class="cmt">// MaxHeap izquierda (mitad menor) + MinHeap derecha (mitad mayor)</span>

<span class="kw">void</span> <span class="fn">agregarNumero</span>(<span class="type">int</span> num) {
    <span class="cmt">// decidir en cuál heap va</span>
    <span class="kw">if</span> (izq->n==<span class="num">0</span> || num <= -<span class="fn">HeapGetMin</span>(izq))
        <span class="fn">HeapInsert</span>(izq, -num);  <span class="cmt">// negamos: maxheap</span>
    <span class="kw">else</span>
        <span class="fn">HeapInsert</span>(der, num);

    <span class="cmt">// balancear: diferencia máx 1</span>
    <span class="kw">if</span> (izq->n > der->n + <span class="num">1</span>) {
        <span class="fn">HeapInsert</span>(der, -<span class="fn">HeapRemoveMin</span>(izq));
    } <span class="kw">else if</span> (der->n > izq->n) {
        <span class="fn">HeapInsert</span>(izq, -<span class="fn">HeapRemoveMin</span>(der));
    }
}

<span class="type">double</span> <span class="fn">getMediana</span>() {
    <span class="kw">if</span> (izq->n > der->n)
        <span class="kw">return</span> -<span class="fn">HeapGetMin</span>(izq);
    <span class="kw">return</span> (-<span class="fn">HeapGetMin</span>(izq) + <span class="fn">HeapGetMin</span>(der)) / <span class="num">2.0</span>;

<span class="cmt">// Coalesce: combina 2 TTs del mismo tamaño</span>
<span class="type">Nodo</span>* <span class="fn">coalesce</span>(<span class="type">Nodo</span>*a, <span class="type">Nodo</span>*b) {
    <span class="kw">if</span> (!a) <span class="kw">return</span> b;
    <span class="kw">if</span> (!b) <span class="kw">return</span> a;
    <span class="cmt">// ganador = menor valor → raíz del nuevo árbol</span>
    <span class="type">Nodo</span> *ganador, *perdedor;
    <span class="kw">if</span> (a->valor <= b->valor)
        { ganador=a; perdedor=b; }
    <span class="kw">else</span>
        { ganador=b; perdedor=a; }
    <span class="cmt">// perdedor se convierte en hijo derecho del ganador</span>
    perdedor->der = ganador->der;
    ganador->der = perdedor;
    <span class="kw">return</span> ganador;

    solution: `<span class="kw">typedef struct</span> { <span class="type">int</span> val, lista, pos; } <span class="type">Item</span>;

<span class="cmt">// Heap de Items por valor</span>
<span class="type">int</span>* <span class="fn">fusionarKListas</span>(<span class="type">int</span> **listas, <span class="type">int</span> *tams, <span class="type">int</span> k, <span class="type">int</span> n) {
    <span class="type">int</span> *res = <span class="fn">malloc</span>(n * <span class="kw">sizeof</span>(<span class="type">int</span>));
    <span class="cmt">// MinHeap de k elementos (uno por lista)</span>
    <span class="type">Item</span> heap[k]; <span class="type">int</span> hn=<span class="num">0</span>;

    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">0</span>;i<k;i++) <span class="kw">if</span>(tams[i]><span class="num">0</span>)
        heap[hn++] = (Item){listas[i][<span class="num">0</span>], i, <span class="num">0</span>};

    <span class="cmt">// ... hacer heapify del array de Items ...</span>
    
    <span class="kw">for</span>(<span class="type">int</span> i=<span class="num">0</span>;i<n;i++) {
        <span class="cmt">// extraer mínimo del heap</span>
        <span class="type">Item</span> min = heap[<span class="num">0</span>];
        res[i] = min.val;
        <span class="cmt">// insertar siguiente de la misma lista</span>
        <span class="kw">if</span>(min.pos+<span class="num">1</span> < tams[min.lista])
            heap[<span class="num">0</span>] = (Item){listas[min.lista][min.pos+<span class="num">1</span>], min.lista, min.pos+<span class="num">1</span>};
        <span class="cmt">// ... heapDown ...</span>
    }
    <span class="kw">return</span> res;
}`
  },
  {
    id: 15,
    num: "15",
    title: "Dijkstra con DecreaseKey",
    phase: "Bloque 4 — Tournament Heaps",
    difficulty: "xhard",
    complexity: "O((V+E) log V)",
    type: "olimpiada",
    struct: "heap + grafo",
    problem: `
<div class="problem-header">
  <div class="problem-num">TAREA 15 · BLOQUE 4 · OLÍMPICA</div>
  <div class="problem-title">Dijkstra — Camino Mínimo</div>
  <div class="problem-badges">
    <span class="badge badge-complexity">O((V+E) log V)</span>
    <span class="badge badge-type">olímpica</span>
    <span class="badge badge-hard">DecreaseKey</span>
  </div>
</div>
<div class="divider-line"></div>
<div class="section-label">Descripción</div>
<div class="problem-text">Implementá el algoritmo de Dijkstra para encontrar el camino mínimo desde un nodo fuente a todos los demás. Este algoritmo es la <strong>motivación real del DecreaseKey</strong> en el Abdication Heap.</div>
<div class="example-block">
<div class="ex-label">grafo de ejemplo</div>
<span class="ex-in">Nodos: 0,1,2,3,4
Aristas: 0→1 (4), 0→2 (1), 2→1 (2), 1→3 (1), 2→3 (5), 3→4 (3)
Fuente: 0</span>
<br><span class="ex-out">dist[0]=0, dist[1]=3, dist[2]=1, dist[3]=4, dist[4]=7</span>
</div>
<div class="hint-block">
  <div class="hint-title">¿Por qué necesitamos DecreaseKey?</div>
  <div class="hint-text">Cuando encontramos un camino más corto a un nodo ya en el heap, necesitamos actualizar su distancia. Eso es exactamente DecreaseKey. Con un heap normal simulamos esto insertando duplicados — menos eficiente pero más simple.</div>
</div>`,
    solution: `<span class="kw">#define</span> INF <span class="num">1e9</span>
<span class="kw">#define</span> V <span class="num">100</span>

<span class="type">int</span> grafo[V][V];  <span class="cmt">// matriz de adyacencia</span>

<span class="kw">void</span> <span class="fn">dijkstra</span>(<span class="type">int</span> n, <span class="type">int</span> src) {
    <span class="type">double</span> dist[V]; <span class="type">int</span> vis[V]={};
    <span class="kw">for</span>(<span class="type">int</span>i=<span class="num">0</span>;i<n;i++) dist[i]=INF;
    dist[src]=<span class="num">0</span>;

    <span class="kw">for</span>(<span class="type">int</span> iter=<span class="num">0</span>; iter<n; iter++) {
        <span class="cmt">// encontrar el no visitado con dist mínima</span>
        <span class="type">int</span> u=-<span class="num">1</span>;
        <span class="kw">for</span>(<span class="type">int</span>i=<span class="num">0</span>;i<n;i++)
            <span class="kw">if</span>(!vis[i] && (u==-<span class="num">1</span>||dist[i]<dist[u])) u=i;

        <span class="kw">if</span>(dist[u]==INF) <span class="kw">break</span>;
        vis[u]=<span class="num">1</span>;

        <span class="cmt">// relajar aristas (aquí iría DecreaseKey)</span>
        <span class="kw">for</span>(<span class="type">int</span>v=<span class="num">0</span>;v<n;v++) {
            <span class="kw">if</span>(grafo[u][v] && dist[u]+grafo[u][v]<dist[v])
                dist[v] = dist[u]+grafo[u][v];  <span class="cmt">// ← DecreaseKey!</span>
        }
    }
    <span class="kw">for</span>(<span class="type">int</span>i=<span class="num">0</span>;i<n;i++)
        <span class="fn">printf</span>(<span class="str">"dist[%d] = %.0f\n"</span>, i, dist[i]);
}`
  }
];

let currentTask = null;
let done = new Set();
let streak = 0;
let solutionVisible = false;

function renderSidebar() {
  const list = document.getElementById('taskList');
  let html = '';
  let currentPhase = '';

  tasks.forEach(t => {
    if (t.phase !== currentPhase) {
      currentPhase = t.phase;
      html += `<div class="phase-label">${t.phase}</div>`;
    }
    const isDone = done.has(t.id);
    html += `
      <div class="task-item ${currentTask?.id===t.id?'active':''} ${isDone?'done':''}" onclick="openTask(${t.id})" data-title="${t.title.toLowerCase()}" data-phase="${t.phase.toLowerCase()}">
        <span class="task-num">${isDone?'✓':t.num}</span>
        <div class="task-info">
          <div class="task-title-sm">${t.title}</div>
          <div class="task-meta-sm">${t.complexity}</div>
        </div>
        <div class="difficulty-dot d-${t.difficulty}"></div>
      </div>`;
  });

  list.innerHTML = html;
  updateProgress();
}

function openTask(id) {
  currentTask = tasks.find(t => t.id === id);
  solutionVisible = false;

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('taskView').classList.add('visible');
  document.getElementById('problemPanel').innerHTML = currentTask.problem;

  const sol = document.getElementById('solutionOverlay');
  sol.classList.remove('visible');
  document.getElementById('solutionCode').innerHTML = currentTask.solution;
  document.getElementById('codeEditor').value = '';

  renderSidebar();
}

function toggleSolution() {
  solutionVisible = !solutionVisible;
  const overlay = document.getElementById('solutionOverlay');
  overlay.classList.toggle('visible', solutionVisible);
}

function markDone() {
  if (!currentTask) return;
  if (!done.has(currentTask.id)) {
    done.add(currentTask.id);
    streak++;
  }
  document.getElementById('statDone').textContent = done.size;
  document.getElementById('statStreak').textContent = streak;
  renderSidebar();
}

function updateProgress() {
  const pct = (done.size / tasks.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done.size} / ${tasks.length}`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===(tab==='problem'?0:1)));
}

function filterTasks(q) {
  const items = document.querySelectorAll('.task-item');
  items.forEach(item => {
    const match = item.dataset.title.includes(q.toLowerCase()) || item.dataset.phase.includes(q.toLowerCase());
    item.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.phase-label').forEach(label => {
    label.style.display = '';
  });
}

renderSidebar();
</script>
</body>
</html>
