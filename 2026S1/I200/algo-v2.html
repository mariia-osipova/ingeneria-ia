        curr=ganador;
    }
    <span class="fn">free</span>(curr); <span class="cm">// liberar la hoja</span>
    <span class="kw">return</span> resultado;
}`},

{id:24,blk:"Bloque 4 · Tournament Heaps",cat:"heap",title:"Lazy Tournament Heap",diff:3,compl:"Insert O(1) amort.",
problem:`
<div class="ph-num">TAREA 24 · LAZY TOURNAMENT HEAP</div>
<div class="ph-title">Lazy Tournament Heap</div>
<div class="ph-badges">
  <span class="badge b-o">Insert O(1)</span>
  <span class="badge b-t">concepto + implementar</span>
  <span class="badge b-s">lazy</span>
</div>
<div class="divl"></div>
<div class="p-text">La idea "lazy" es <strong>no hacer Coalesce al insertar</strong>. Simplemente agregamos el nuevo TT de 1 nodo a la lista, sin fusionar nada. El Coalesce se hace solo cuando hacemos RemoveMin.</div>
<div class="sec-lbl">Operaciones</div>
<div class="code-block">Insert(LTH *h, int val):
    crear TT de 1 nodo
    agregar a la lista de TTs sin Coalesce
    → O(1)   ← mejora sobre Tournament Heap O(log n)!

RemoveMin(LTH *h):
    GetMin: comparar TODAS las raíces  → puede ser O(n) peor caso
    Fracture del TT mínimo             → O(log n)
    Coalesce todos los TTs ahora       → O(log n) amortizado
    → O(log n) amortizado</div>
<div class="sec-lbl">Análisis amortizado de RemoveMin</div>
<div class="theory-box">Argumento: después de cada RemoveMin queda a lo sumo log(n) TTs.
Los inserts "guardan créditos" que se gastan en el Coalesce del RemoveMin.
Promediando sobre todas las operaciones → O(log n) amortizado.</div>
<div class="sec-lbl">Tabla comparativa</div>
<table class="ctable">
  <tr><th>Op</th><th>Heap</th><th>T.Heap</th><th>L.T.Heap</th></tr>
  <tr><td>Insert</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cg">O(1)</td></tr>
  <tr><td>GetMin</td><td class="cg">O(1)</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td></tr>
  <tr><td>Meld</td><td class="cr">O(n)</td><td class="cg">O(log n₁+log n₂)</td><td class="cg">O(1)</td></tr>
</table>
<div class="hint">
  <div class="hint-t">Teorema: no se puede mejorar ambas a la vez</div>
  <div class="hint-b">Si Insert fuera mejor que O(log n) Y RemoveMin mejor que O(log n), podríamos ordenar n elementos en menos de O(n log n): insertar todos + extraer todos. Imposible por el teorema del límite inferior. Por eso solo podemos mejorar una de las dos.</div>
</div>`,
solution:`<span class="cm">// Lazy Tournament Heap: Insert sin Coalesce</span>

<span class="kw">void</span> <span class="fn">LazyInsert</span>(<span class="ty">LTH</span>*h, <span class="ty">int</span> val){
    <span class="ty">Nodo</span>*n=<span class="fn">nuevoNodo</span>(val);
    <span class="cm">// simplemente agregar a la lista de TTs</span>
    <span class="cm">// sin Coalesce → O(1)</span>
    h->arboles[h->num++] = n;
}

<span class="cm">// RemoveMin: ahora sí hacemos todo el trabajo
// 1. Encontrar mínimo entre TODOS los árboles (lazy list puede tener muchos)
// 2. Fracture del ganador
// 3. Coalesce de todos → dejar a lo sumo log(n) árboles
// Costo amortizado: O(log n)</span>`},

{id:25,blk:"Bloque 4 · Tournament Heaps",cat:"heap",title:"Abdication Heap + DecreaseKey",diff:4,compl:"DecreaseKey O(1)",
problem:`
<div class="ph-num">TAREA 25 · ABDICATION HEAP</div>
<div class="ph-title">Abdication Heap — DecreaseKey O(1)</div>
<div class="ph-badges">
  <span class="badge b-o">DecreaseKey O(1)</span>
  <span class="badge b-t">concepto</span>
  <span class="badge b-d">avanzado</span>
</div>
<div class="divl"></div>
<div class="p-text">El Abdication Heap extiende el Lazy Tournament Heap para soportar DecreaseKey en O(1) amortizado. Esto lo hace ideal para Dijkstra.</div>
<div class="sec-lbl">Problema con DecreaseKey en Tournament Heap</div>
<div class="p-text">Si una hoja disminuye su valor, puede violar la propiedad del torneo. En el Tournament Heap normal, tendríamos que "re-jugar" el torneo desde esa hoja hasta la raíz → O(log n).</div>
<div class="sec-lbl">Idea del Abdication Heap</div>
<div class="p-text">En lugar de re-jugar, hacemos un <strong>Fracture parcial</strong>: el nodo actualizado "abdica" de su posición actual y se libera como un nuevo TT de 1 nodo. Los ancestros que ya no tienen el campeón correcto se marcan o actualizan.</div>
<div class="code-block">DecreaseKey en Abdication Heap:
    a) Actualizar el valor de la hoja
    b) Hacer Fracture parcial del camino raíz→hoja
       → genera nuevos TTs (sub-árboles del camino)
    c) Agregar el nodo modificado como TT nuevo
    → O(1) amortizado</div>
<div class="sec-lbl">Tabla final — todas las estructuras</div>
<table class="ctable">
  <tr><th>Op</th><th>Heap</th><th>T.Heap</th><th>L.T.Heap</th><th>Ab.Heap</th></tr>
  <tr><td>Build</td><td class="cg">O(1)</td><td class="cg">O(1)</td><td class="cg">O(1)</td><td class="cg">O(1)</td></tr>
  <tr><td>Heapify</td><td class="cg">O(n)</td><td class="cg">O(n)</td><td class="cg">O(n)</td><td class="cg">O(n)</td></tr>
  <tr><td>Insert</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cg">O(1)</td><td class="cg">O(1)</td></tr>
  <tr><td>GetMin</td><td class="cg">O(1)</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td></tr>
  <tr><td>RemoveMin</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td></tr>
  <tr><td>DecreaseKey</td><td class="cy">O(log n)</td><td class="cy">O(log n)</td><td class="cg">O(1)</td><td class="cg">O(1)</td></tr>
  <tr><td>Meld</td><td class="cr">O(n)</td><td class="cg">O(log)</td><td class="cg">O(1)</td><td class="cg">O(1)</td></tr>
  <tr><td>Destroy</td><td class="cg">O(1)</td><td class="cy">O(n)</td><td class="cy">O(n)</td><td class="cy">O(n)</td></tr>
</table>`,
solution:`<span class="cm">// Abdication Heap — DecreaseKey en O(1) amortizado
//
// La clave: en lugar de "re-jugar" el torneo hacia arriba,
// hacemos que el nodo "abdique": se separa de su árbol,
// sus ancestros se actualizan mínimamente, y el nodo
// modificado se convierte en un nuevo TT de tamaño 1.
//
// El resultado ya NO es un Tournament Heap clásico
// (algunos internos pueden tener valor incorrecto),
// pero la propiedad global de heap se mantiene.
//
// Implementación completa es compleja — lo importante:
// entender el concepto y la tabla de complejidades.</span>

<span class="cm">// Aplicación: Dijkstra con Abdication Heap
// Al relajar una arista (u,v) con nuevo dist[v]:
//   decreaseKey(h, nodo_v, nuevo_dist)  → O(1)
// Total Dijkstra: O((V+E) · O(1)) + O(V · log V para RemoveMin)
//              = O(E + V log V)  ← óptimo!</span>`},

// ── BLOQUE 5: OLÍMPICAS ──────────────────────────────
{id:26,blk:"Bloque 5 · Olímpicas",cat:"olimpiada",title:"Conteo de inversiones",diff:2,compl:"O(n log n)",
problem:`
<div class="ph-num">TAREA 26 · OLÍMPICA</div>
<div class="ph-title">Conteo de Inversiones</div>
<div class="ph-badges">
  <span class="badge b-o">O(n log n)</span>
  <span class="badge b-t">olímpica</span>
  <span class="badge b-s">merge sort</span>
</div>
<div class="divl"></div>
<div class="p-text">Dado un arreglo, contá el número de <strong>inversiones</strong>: pares (i, j) con i &lt; j pero a[i] &gt; a[j]. Una inversión mide qué tan "desordenado" está.</div>
<div class="code-block">Ejemplos:
[2,4,1,3,5] → 3 inversiones: (2,1),(4,1),(4,3)
[1,2,3,4,5] → 0 inversiones (ya ordenado)
[5,4,3,2,1] → 10 inversiones (máximo para n=5)</div>
<div class="hint">
  <div class="hint-t">Idea: modificar Merge</div>
  <div class="hint-b">Cuando en el Merge tomamos un elemento de la mitad derecha (j) antes que uno de la izquierda (i), hay exactamente (mid - i + 1) inversiones con todos los elementos restantes de la izquierda. Contarlas dentro del Merge.</div>
</div>`,
solution:`<span class="ty">long long</span> <span class="fn">mergeCount</span>(<span class="ty">int</span>*a,<span class="ty">int</span> l,<span class="ty">int</span> m,<span class="ty">int</span> r){
    <span class="ty">long long</span> inv=<span class="nm">0</span>;
    <span class="ty">int</span> n=r-l+<span class="nm">1</span>,*aux=<span class="fn">malloc</span>(n*<span class="kw">sizeof</span>(<span class="ty">int</span>));
    <span class="ty">int</span> i=l,j=m+<span class="nm">1</span>,k=<span class="nm">0</span>;
    <span class="kw">while</span>(i<=m&&j<=r){
        <span class="kw">if</span>(a[i]<=a[j]) aux[k++]=a[i++];
        <span class="kw">else</span>{ aux[k++]=a[j++]; inv+=(m-i+<span class="nm">1</span>); } <span class="cm">// CLAVE</span>
    }
    <span class="kw">while</span>(i<=m) aux[k++]=a[i++];
    <span class="kw">while</span>(j<=r) aux[k++]=a[j++];
    <span class="kw">for</span>(<span class="ty">int</span> x=<span class="nm">0</span>;x<n;x++) a[l+x]=aux[x];
    <span class="fn">free</span>(aux); <span class="kw">return</span> inv;
}

<span class="ty">long long</span> <span class="fn">countInversions</span>(<span class="ty">int</span>*a,<span class="ty">int</span> l,<span class="ty">int</span> r){
    <span class="kw">if</span>(l>=r) <span class="kw">return</span> <span class="nm">0</span>;
    <span class="ty">int</span> m=(l+r)/<span class="nm">2</span>;
    <span class="ty">long long</span> inv=<span class="nm">0</span>;
    inv+=<span class="fn">countInversions</span>(a,l,m);
    inv+=<span class="fn">countInversions</span>(a,m+<span class="nm">1</span>,r);
    inv+=<span class="fn">mergeCount</span>(a,l,m,r);
    <span class="kw">return</span> inv;
}`},

{id:27,blk:"Bloque 5 · Olímpicas",cat:"olimpiada",title:"K-ésimo menor elemento",diff:2,compl:"O(n log k)",
problem:`
<div class="ph-num">TAREA 27 · OLÍMPICA</div>
<div class="ph-title">K-ésimo Menor con MaxHeap</div>
<div class="ph-badges">
  <span class="badge b-o">O(n log k)</span>
  <span class="badge b-t">olímpica</span>
  <span class="badge b-s">heap</span>
</div>
<div class="divl"></div>
<div class="p-text">Dado un arreglo de n números, encontrá el k-ésimo menor <strong>sin ordenar todo</strong>. Solución eficiente: MaxHeap de tamaño k.</div>
<div class="code-block">Idea: mantener un MaxHeap con los k menores vistos.
Para cada elemento nuevo:
  si heap.size &lt; k    → insertar
  si elem &lt; heap.max  → sacar max, insertar elem
Al final: heap.max = k-ésimo menor

Ejemplo: [7,10,4,3,20,15], k=3
→ k-ésimo menor = 7 (menores son 3,4,7)</div>
<div class="hint">
  <div class="hint-t">¿Por qué O(n log k) y no O(n log n)?</div>
  <div class="hint-b">El heap siempre tiene a lo sumo k elementos, entonces cada operación es O(log k). Hacemos n operaciones → O(n log k). Si k es pequeño, es mucho mejor que ordenar todo.</div>
</div>`,
solution:`<span class="cm">// Usando MaxHeap (negamos los valores para usar MinHeap)</span>
<span class="ty">int</span> <span class="fn">kesimo</span>(<span class="ty">int</span>*a, <span class="ty">int</span> n, <span class="ty">int</span> k){
    <span class="ty">Heap</span>*h=<span class="fn">Build</span>(k);
    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<n;i++){
        <span class="kw">if</span>(h->n < k){
            <span class="fn">Insert</span>(h, -a[i]);         <span class="cm">// negar = MaxHeap</span>
        } <span class="kw">else if</span>(-a[i] > h->p[<span class="nm">1</span>]){ <span class="cm">// más chico que el max</span>
            <span class="fn">RemoveMin</span>(h);
            <span class="fn">Insert</span>(h, -a[i]);
        }
    }
    <span class="ty">int</span> res=-<span class="fn">GetMin</span>(h);
    <span class="fn">free</span>(h->p); <span class="fn">free</span>(h);
    <span class="kw">return</span> res;
}`},

{id:28,blk:"Bloque 5 · Olímpicas",cat:"olimpiada",title:"Mediana de un flujo",diff:3,compl:"O(log n) por elem.",
problem:`
<div class="ph-num">TAREA 28 · OLÍMPICA</div>
<div class="ph-title">Mediana de un Flujo</div>
<div class="ph-badges">
  <span class="badge b-o">O(log n) por elemento</span>
  <span class="badge b-t">olímpica</span>
  <span class="badge b-d">dos heaps</span>
</div>
<div class="divl"></div>
<div class="p-text">Llegan números uno a uno. Después de cada número, imprimí la mediana actual. Solución: <strong>dos heaps balanceados</strong>.</div>
<div class="code-block">MaxHeap izquierda: guarda mitad menor
MinHeap derecha:   guarda mitad mayor

Invariante: |izq.size - der.size| ≤ 1
Mediana: si igual tamaño → (izq.max + der.min) / 2
         si diferente    → tope del heap más grande

Flujo: 5 → med=5 | agregar 2 → med=3.5 | agregar 8 → med=5</div>
<div class="hint">
  <div class="hint-t">Balanceo</div>
  <div class="hint-b">Después de cada inserción, verificá que los tamaños no difieran en más de 1. Si el izquierdo tiene 2 más que el derecho, movés el max del izquierdo al derecho, y vice versa.</div>
</div>`,
solution:`<span class="ty">Heap</span> *izq, *der; <span class="cm">// izq: MaxHeap (negamos), der: MinHeap</span>

<span class="kw">void</span> <span class="fn">agregar</span>(<span class="ty">int</span> num){
    <span class="cm">// decidir a qué heap va</span>
    <span class="kw">if</span>(izq->n==<span class="nm">0</span> || num <= -<span class="fn">GetMin</span>(izq))
        <span class="fn">Insert</span>(izq, -num);
    <span class="kw">else</span>
        <span class="fn">Insert</span>(der, num);
    <span class="cm">// balancear</span>
    <span class="kw">if</span>(izq->n > der->n+<span class="nm">1</span>)
        <span class="fn">Insert</span>(der, -<span class="fn">RemoveMin</span>(izq));
    <span class="kw">else if</span>(der->n > izq->n)
        <span class="fn">Insert</span>(izq, -<span class="fn">RemoveMin</span>(der));
}

<span class="ty">double</span> <span class="fn">mediana</span>(){
    <span class="kw">if</span>(izq->n > der->n) <span class="kw">return</span> -<span class="fn">GetMin</span>(izq);
    <span class="kw">return</span> (-<span class="fn">GetMin</span>(izq) + <span class="fn">GetMin</span>(der)) / <span class="nm">2.0</span>;
}`},

{id:29,blk:"Bloque 5 · Olímpicas",cat:"olimpiada",title:"Fusión de K listas ordenadas",diff:3,compl:"O(n log k)",
problem:`
<div class="ph-num">TAREA 29 · OLÍMPICA</div>
<div class="ph-title">Fusión de K Listas Ordenadas</div>
<div class="ph-badges">
  <span class="badge b-o">O(n log k)</span>
  <span class="badge b-t">olímpica</span>
  <span class="badge b-s">minheap</span>
</div>
<div class="divl"></div>
<div class="p-text">Tenés k listas ordenadas con n elementos en total. Fusionalas en una sola lista ordenada.</div>
<div class="code-block">Algoritmo con MinHeap de k elementos:
1. Insertar el primer elemento de cada lista en el heap
   (guardando de qué lista viene y su posición)
2. Repetir n veces:
   - Extraer el mínimo del heap → agregarlo al resultado
   - Insertar el siguiente elemento de esa misma lista
3. Heap nunca tiene más de k elementos → O(n log k)</div>
<div class="code-block">Ejemplo k=3:
Lista 1: [1,4,7]    Lista 2: [2,5,8]    Lista 3: [3,6,9]
Heap inicial: {(1,L1), (2,L2), (3,L3)}
→ sacar 1, insertar 4 → {(2,L2),(3,L3),(4,L1)}
→ sacar 2, insertar 5 → {(3,L3),(4,L1),(5,L2)}
... → [1,2,3,4,5,6,7,8,9]</div>`,
solution:`<span class="kw">typedef struct</span> { <span class="ty">int</span> val, lista, pos; } <span class="ty">Item</span>;

<span class="cm">// MinHeap de Items por val (implementación simplificada)</span>
<span class="ty">int</span>* <span class="fn">fusionarK</span>(<span class="ty">int</span>**listas, <span class="ty">int</span>*tams, <span class="ty">int</span> k, <span class="ty">int</span> n){
    <span class="ty">int</span>*res=<span class="fn">malloc</span>(n*<span class="kw">sizeof</span>(<span class="ty">int</span>));
    <span class="ty">Item</span> heap[k]; <span class="ty">int</span> hn=<span class="nm">0</span>;

    <span class="cm">// inicializar con primeros elementos</span>
    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<k;i++)
        <span class="kw">if</span>(tams[i]><span class="nm">0</span>)
            heap[hn++]=(Item){listas[i][<span class="nm">0</span>],i,<span class="nm">0</span>};
    <span class="cm">// heapify inicial...</span>

    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<n;i++){
        Item min=heap[<span class="nm">0</span>]; res[i]=min.val;
        <span class="kw">if</span>(min.pos+<span class="nm">1</span> < tams[min.lista])
            heap[<span class="nm">0</span>]=(Item){listas[min.lista][min.pos+<span class="nm">1</span>],min.lista,min.pos+<span class="nm">1</span>};
        <span class="cm">// heapDown de heap[0]...</span>
    }
    <span class="kw">return</span> res;
}`},

{id:30,blk:"Bloque 5 · Olímpicas",cat:"olimpiada",title:"Dijkstra — camino mínimo",diff:4,compl:"O((V+E) log V)",
problem:`
<div class="ph-num">TAREA 30 · OLÍMPICA</div>
<div class="ph-title">Dijkstra — Camino Mínimo</div>
<div class="ph-badges">
  <span class="badge b-o">O((V+E) log V)</span>
  <span class="badge b-t">olímpica</span>
  <span class="badge b-d">DecreaseKey</span>
</div>
<div class="divl"></div>
<div class="p-text">Dijkstra encuentra el camino más corto desde un nodo fuente a todos los demás en un grafo con pesos positivos. Es la motivación real del Abdication Heap.</div>
<div class="code-block">Dijkstra(G, fuente):
    dist[] = INF para todos, dist[fuente] = 0
    heap = MinHeap con todos los nodos
    mientras heap no vacío:
        u = RemoveMin(heap)          ← nodo más cercano
        para cada vecino v de u:
            if dist[u] + peso(u,v) &lt; dist[v]:
                dist[v] = dist[u] + peso(u,v)
                DecreaseKey(heap, v, dist[v])  ← aquí el DecreaseKey!</div>
<div class="code-block">Ejemplo:
  0 →1(4), 0→2(1), 2→1(2), 1→3(1), 3→4(3)
  desde nodo 0:
  dist = [0, 3, 1, 4, 7]</div>
<div class="hint">
  <div class="hint-t">Complejidad</div>
  <div class="hint-b">Con MinHeap + DecreaseKey: O((V+E) log V). Con Abdication Heap donde DecreaseKey=O(1): O(E + V log V) ← óptimo para grafos densos. Con array simple (sin heap): O(V²) ← mejor para grafos muy densos.</div>
</div>`,
solution:`<span class="kw">#define</span> INF 1e9
<span class="kw">#define</span> MAXV 100

<span class="kw">void</span> <span class="fn">dijkstra</span>(<span class="ty">int</span> G[][MAXV], <span class="ty">int</span> n, <span class="ty">int</span> src){
    <span class="ty">double</span> dist[MAXV]; <span class="ty">int</span> vis[MAXV]={};
    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<n;i++) dist[i]=INF;
    dist[src]=<span class="nm">0</span>;

    <span class="kw">for</span>(<span class="ty">int</span> iter=<span class="nm">0</span>;iter<n;iter++){
        <span class="cm">// RemoveMin: O(V) con array simple</span>
        <span class="ty">int</span> u=-<span class="nm">1</span>;
        <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<n;i++)
            <span class="kw">if</span>(!vis[i]&&(u==-<span class="nm">1</span>||dist[i]<dist[u])) u=i;
        <span class="kw">if</span>(dist[u]==INF) <span class="kw">break</span>;
        vis[u]=<span class="nm">1</span>;

        <span class="kw">for</span>(<span class="ty">int</span> v=<span class="nm">0</span>;v<n;v++){
            <span class="kw">if</span>(G[u][v] && dist[u]+G[u][v]<dist[v]){
                dist[v]=dist[u]+G[u][v]; <span class="cm">// DecreaseKey!</span>
            }
        }
    }
    <span class="kw">for</span>(<span class="ty">int</span> i=<span class="nm">0</span>;i<n;i++)
        printf(<span class="st">"dist[%d]=%.0f\\n"</span>,i,dist[i]);
}`}

]; // end TASKS

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cur = null;
let done = new Set();
let solVis = false;
let activeFilter = 'all';
let notes = {};

// ═══════════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════════
function buildSidebar(tasks) {
  const el = document.getElementById('sbList');
  let html = '', blk = '';
  tasks.forEach(t => {
    if (t.blk !== blk) {
      blk = t.blk;
      html += `<div class="blk-label">${blk}</div>`;
    }
    const isDone = done.has(t.id);
    const isActive = cur?.id === t.id;
    html += `<div class="t-item${isActive?' active':''}${isDone?' done':''}" onclick="openTask(${t.id})" data-id="${t.id}">
      <span class="t-n">${isDone?'✓':t.id}</span>
      <div class="t-info">
        <div class="t-name">${t.title}</div>
        <div class="t-sub">${t.compl}</div>
      </div>
      <div class="d-pip dp-${t.diff}"></div>
    </div>`;
  });
  el.innerHTML = html;

  const total = TASKS.length;
  const doneN = done.size;
  document.getElementById('progFill').style.width = (doneN/total*100)+'%';
  document.getElementById('progTxt').textContent = doneN+'/'+total;
  document.getElementById('stDone').textContent = doneN;
  document.getElementById('stTotal').textContent = total;
}

function getFiltered() {
  return TASKS.filter(t => activeFilter==='all' || t.cat===activeFilter);
}

// ═══════════════════════════════════════════════════
// OPEN TASK
// ═══════════════════════════════════════════════════
function openTask(id) {
  const t = TASKS.find(x=>x.id===id);
  if(!t) return;
  cur = t;
  solVis = false;

  document.getElementById('welcomeEl').style.display='none';
  document.getElementById('taskView').classList.add('on');
  document.getElementById('tvScroll').innerHTML = t.problem;
  document.getElementById('solCode').innerHTML = t.solution;
  document.getElementById('solOv').classList.remove('on');

  // restore notes
  document.getElementById('notesTitleEl').textContent = t.title + ' — notas';
  document.getElementById('notesArea').value = notes[id]||'';

  // restore editor
  document.getElementById('codeEd').value = '';

  buildSidebar(getFiltered());
  switchToTab('problem');
}

// ═══════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════
let currentTab = 'problem';

function switchToTab(tab) {
  currentTab = tab;
  const scroll = document.getElementById('tvScroll');
  const editor = document.getElementById('editorPanel');
  const notes_ = document.getElementById('notesPanel');
  const tabs = document.querySelectorAll('.tab');

  tabs.forEach((t,i)=>t.classList.toggle('on',i===(tab==='problem'?0:1)));

  if(tab==='problem'){
    scroll.style.display='';
    editor.style.display='';
    notes_.classList.remove('on');
  } else {
    scroll.style.display='none';
    editor.style.display='none';
    notes_.classList.add('on');
  }
}

function switchTab(tab, el) { switchToTab(tab); }

// save notes on input
document.getElementById('notesArea').addEventListener('input', function(){
  if(cur) notes[cur.id] = this.value;
});

// ═══════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════
function toggleSol() {
  solVis = !solVis;
  document.getElementById('solOv').classList.toggle('on', solVis);
}

function markDone() {
  if(!cur) return;
  done.add(cur.id);
  buildSidebar(getFiltered());
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildSidebar(getFiltered());
}

function doSearch(q) {
  const items = document.querySelectorAll('.t-item');
  const labels = document.querySelectorAll('.blk-label');
  q = q.toLowerCase();
  items.forEach(el => {
    const name = el.querySelector('.t-name').textContent.toLowerCase();
    const sub = el.querySelector('.t-sub').textContent.toLowerCase();
    el.style.display = (name.includes(q)||sub.includes(q)) ? '' : 'none';
  });
  // hide empty block labels
  labels.forEach(lbl => {
    let next = lbl.nextElementSibling;
    let visible = false;
    while(next && !next.classList.contains('blk-label')) {
      if(next.style.display !== 'none') visible = true;
      next = next.nextElementSibling;
    }
    lbl.style.display = visible ? '' : 'none';
  });
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildSidebar(TASKS);
</script>
</body>
</html>
